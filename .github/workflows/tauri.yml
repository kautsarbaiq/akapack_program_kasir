name: Build AKAPACK (Tauri)

# Jalankan manual (Actions → Run workflow) atau saat push tag v* (mis. v0.1.0).
# Hanya membangun installer Windows (.exe/.msi) — target: PC karyawan.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        # npm 10/11 punya bug arborist pada dependency tree ini; pnpm me-resolve dengan bersih.
        # Disamakan dengan pnpm lokal (11.1.2) agar pnpm-workspace.yaml & lockfile terbaca identik.
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        # pnpm 11 butuh Node >= 22.13 (pakai node:sqlite). Node 20 → crash ERR_UNKNOWN_BUILTIN_MODULE.
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps JS
        run: pnpm install --no-frozen-lockfile

      - name: Tulis .env.local dari secrets
        shell: bash
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      - name: Build & rilis (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-latest' }}
          releaseName: 'AKAPACK Windows'
          releaseBody: 'Installer AKAPACK untuk Windows. Unduh file .exe atau .msi di bawah, lalu install di PC karyawan.'
          releaseDraft: true
          prerelease: false

      # Unggah installer juga ke tab "Artifacts" run ini — paling gampang diunduh
      # (langsung dari halaman Actions, tak perlu buka Releases).
      - name: Unggah installer ke Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AKAPACK-Windows-Installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
